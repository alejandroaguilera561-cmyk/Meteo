<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Meteo MAX PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
 margin:0;
 font-family:'Segoe UI';
 color:white;
 text-align:center;
 background:linear-gradient(180deg,#0f172a,#020617);
}

.app{
 padding:15px;
}

.dashboard{
 display:grid;
 grid-template-columns:1fr 1fr;
 gap:12px;
}

.card{
 background:rgba(255,255,255,0.1);
 padding:15px;
 border-radius:15px;
}

.big{
 font-size:26px;
}

#explicacion{
 background:#1e293b;
 padding:15px;
 border-radius:12px;
 margin:10px 0;
}

#alerta{
 background:#7f1d1d;
 padding:10px;
 border-radius:10px;
 margin-bottom:10px;
 font-size:14px;
}

#pronostico{
 display:flex;
 overflow-x:auto;
 gap:10px;
}

.day{
 background:rgba(255,255,255,0.1);
 padding:10px;
 border-radius:10px;
 min-width:120px;
}
</style>
</head>

<body>

<div class="app">

<h2>🌦️ Meteo MAX PRO</h2>

<button onclick="activarVoz()">🔊 Voz</button>
<button onclick="toggleUbicacion()">📍 Ubicación</button>

<div id="alerta">Cargando alertas...</div>

<div class="dashboard">

<div class="card">
 Temperatura
 <div class="big" id="temp">--</div>
</div>

<div class="card">
 Sensación 🥶🥵
 <div class="big" id="sensacion">--</div>
</div>

<div class="card">💧 Humedad<br><span id="hum"></span></div>
<div class="card">🌬️ Viento<br><span id="viento"></span></div>
<div class="card">☀️ UV<br><span id="uv"></span></div>
<div class="card">🌧️ Lluvia<br><span id="lluvia"></span></div>

</div>

<div id="explicacion">Cargando...</div>

<h3>📅 Pronóstico</h3>
<div style="font-size:12px;opacity:0.8;">
 Máx = temperatura más alta del día<br>
 Mín = temperatura más baja (noche/madrugada)
</div>

<div id="pronostico"></div>

<canvas id="grafico"></canvas>
<div id="mapa" style="height:200px;margin-top:10px;border-radius:10px;"></div>

</div>

<script>
let lat=-25.3, lon=-57.6;
let vozActiva=false;
let ultimaVoz=0;

// VOZ
function activarVoz(){
 vozActiva=true;
 hablar(document.getElementById("explicacion").innerText);
}

function hablar(t){
 if(!vozActiva) return;
 let ahora=Date.now();
 if(ahora-ultimaVoz<20000) return;

 speechSynthesis.cancel();
 let m=new SpeechSynthesisUtterance(t);
 m.lang="es-ES";
 speechSynthesis.speak(m);

 ultimaVoz=ahora;
}

// EMOJI
function emojiTemp(t){
 if(t>=30) return "🥵";
 if(t>=20) return "🙂";
 if(t>=12) return "🧥";
 if(t>=6) return "🥶";
 return "🧊";
}

// MENSAJE + CONSEJO
function explicar(temp,lluvia,uv,hum,viento){
 let t="", consejo="";

 if(temp>=30){ t="Hace mucho calor."; consejo="Usá ropa liviana."; }
 else if(temp>=20){ t="Clima cálido."; consejo="Podés salir cómodo."; }
 else if(temp>=15){ t="Clima templado."; consejo="Llevá abrigo ligero."; }
 else if(temp>=8){ t="Hace frío."; consejo="Salí abrigado."; }
 else{ t="Hace mucho frío."; consejo="Abrígate bien."; }

 if(lluvia>60) consejo+=" Llevá paraguas.";
 else if(lluvia>30) consejo+=" Puede llover.";

 if(viento>30) consejo+=" Viento fuerte.";
 if(uv>7) consejo+=" Protector solar.";

 let final=t+" "+consejo;

 document.getElementById("explicacion").innerText=final;
 hablar(final);
}

// ALERTAS (MEJORA EXTRA)
function alerta(temp,lluvia,viento){
 let a="";

 if(temp<8) a="⚠️ Mucho frío hoy.";
 else if(temp>35) a="⚠️ Calor extremo.";

 if(lluvia>60) a+=" 🌧️ Lluvia casi segura.";
 if(viento>40) a+=" 💨 Viento fuerte.";

 if(a==="") a="✅ Sin alertas importantes.";

 document.getElementById("alerta").innerText=a;
}

// UBICACIÓN
function toggleUbicacion(){
 navigator.geolocation.getCurrentPosition(p=>{
  lat=p.coords.latitude;
  lon=p.coords.longitude;
  mapa.setView([lat,lon],10);
 });
}

// GRÁFICO
let chart=new Chart(document.getElementById("grafico"),{
 type:'line',
 data:{labels:[],datasets:[{label:"Temp °C",data:[],borderWidth:2}]}
});

// CLIMA
async function clima(){
 let r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max&hourly=relativehumidity_2m,precipitation_probability,apparent_temperature,uv_index&timezone=auto`);
 let d=await r.json();

 let temp=d.current_weather.temperature;
 let viento=d.current_weather.windspeed;
 let hum=d.hourly.relativehumidity_2m[0];
 let lluvia=d.hourly.precipitation_probability[0];
 let sensacion=d.hourly.apparent_temperature[0];
 let uv=d.hourly.uv_index[0];

 document.getElementById("temp").innerText=temp+"°C "+emojiTemp(temp);
 document.getElementById("sensacion").innerText=sensacion+"°C "+emojiTemp(sensacion);
 document.getElementById("hum").innerText=hum+"%";
 document.getElementById("viento").innerText=viento+" km/h";
 document.getElementById("uv").innerText=uv;
 document.getElementById("lluvia").innerText=lluvia+"%";

 explicar(temp,lluvia,uv,hum,viento);
 alerta(temp,lluvia,viento);

 // gráfico
 chart.data.labels.push(new Date().toLocaleTimeString());
 chart.data.datasets[0].data.push(temp);
 if(chart.data.labels.length>10){
  chart.data.labels.shift();
  chart.data.datasets[0].data.shift();
 }
 chart.update();

 // PRONÓSTICO
 let cont=document.getElementById("pronostico");
 cont.innerHTML="";

 d.daily.time.forEach((dia,i)=>{
  let max=d.daily.temperature_2m_max[i];
  let min=d.daily.temperature_2m_min[i];
  let lluvia=d.daily.precipitation_probability_max[i];

  let estado=max>30?"🥵 Calor":max>20?"🙂 Cálido":max>15?"🧥 Templado":"🥶 Frío";

  cont.innerHTML+=`
   <div class="day">
    <b>${dia.slice(5)}</b><br>
    ${estado}<br>
    🌡️ Máx: ${max}°<br>
    ❄️ Mín: ${min}°<br>
    🌧️ ${lluvia}%
   </div>
  `;
 });
}

clima();
setInterval(clima,30000);

// MAPA
let mapa=L.map('mapa').setView([lat,lon],10);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapa);

</script>

</body>
</html>
