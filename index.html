<!DOCTYPE html>
<html lang="es">
<head>

<style>
body{
 margin:0;
 font-family:'Segoe UI';
 background:url('https://images.unsplash.com/photo-1506744038136-46273834b3fb') no-repeat center/cover;

/* 🔥 CONTENEDOR PRINCIPAL (CLAVE) */
.app{
 background:rgba(0,0,0,0.55);
 min-height:100vh;
 padding:10px;
 color:white;
 overflow-y:auto;
}

/* tarjetas */
.dashboard{
 display:grid;
 grid-template-columns:1fr 1fr;
 gap:10px;
}
.card{
 background:rgba(255,255,255,0.15);
 padding:12px;
 border-radius:12px;
}

/* mapa */
#mapa{
 height:160px;
 width:100%;
 border-radius:15px;
 margin-top:10px;
}

/* scroll */
.scroll{
 display:flex;
 overflow-x:auto;
 gap:8px;
 padding:10px 0;
}
.bloque{
 background:rgba(255,255,255,0.2);
 padding:10px;
 border-radius:10px;
 min-width:90px;
}

/* IA */
#explicacion{
 background:rgba(0,0,0,0.6);
 padding:10px;
 border-radius:10px;
 margin:10px 0;
}
</style>
</head>
