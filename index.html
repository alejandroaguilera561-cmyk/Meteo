<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sistema Meteorológico Inteligente</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
 margin:0;
 font-family:'Segoe UI';
 color:white;
 text-align:center;
 background:url('https://images.unsplash.com/photo-1506744038136-46273834b3fb') no-repeat center/cover;
}

.app{
 background:rgba(0,0,0,0.6);
 min-height:100vh;
 padding:10px;
}

.dashboard{
 display:grid;
 grid-template-columns:1fr 1fr;
 gap:10px;
}

.card{
 background:rgba(255,255,255,0.2);
 padding:12px;
 border-radius:12px;
 font-size:18px;
}

button{
 margin:5px;
 padding:10px;
 border:none;
 border-radius:8px;
 font-size:16px;
}

#mapa{
 height:180px;
 margin-top:10px;
 border-radius:10px;
}

#explicacion{
 background:rgba(0,0,0,0.7);
 padding:12px;
 border-radius:10px;
 margin:10px 0;
 font-size:16px;
}
</style>
</head>

<body>

<div class="app">

<h2>🌦️ Sistema Meteorológico Inteligente</h2>

<button onclick="activarVoz()">🔊 Voz</button>
<button onclick="toggleUbicacion()">📍 Ubicación</button>

<div class="dashboard">
<div class="card" id="temp">--</div>
<div class="card" id="sensacion">--</div>
<div class="card" id="hum">--</div>
<div class="card" id="viento">--</div>
<div class="card" id="uv">--</div>
<div class="card" id="lluvia">--</div>
</div>

<div id="explicacion">Cargando clima...</div>

<canvas id="grafico"></canvas>
<div id="mapa"></div>

</div>

<script>
let lat=-25.3, lon=-57.6;
let vozActiva=false;

// control de voz
let ultimaVoz = 0;
let intervaloVoz = 20000; // 20 segundos

function activarVoz(){
 vozActiva = true;
 hablar(document.getElementById("explicacion").innerText);
}

function hablar(t){
 if(!vozActiva) return;

 let ahora = Date.now();

 if(ahora - ultimaVoz < intervaloVoz) return;

 speechSynthesis.cancel();

 let m = new SpeechSynthesisUtterance(t);
 m.lang="es-ES";
 speechSynthesis.speak(m);

 ultimaVoz = ahora;
}

// ubicación
function toggleUbicacion(){
 navigator.geolocation.getCurrentPosition(p=>{
  lat=p.coords.latitude;
  lon=p.coords.longitude;
  mapa.setView([lat,lon],10);
 });
}

// gráfico
let chart=new Chart(document.getElementById("grafico"),{
 type:'line',
 data:{
  labels:[],
  datasets:[{
   label:"Temperatura °C",
   data:[],
   borderWidth:2,
   tension:0.4
  }]
 }
});

// IA mejorada
function explicar(temp,lluvia,uv,hum,viento){
 let t="";

 if(lluvia > 70){
  t="Lluvia muy probable, llevá paraguas.";
 } 
 else if(lluvia > 40){
  t="Hay posibilidad de lluvia.";
 }
 else if(temp > 35){
  t="Hace mucho calor, hidratate bien.";
 }
 else if(temp > 28){
  t="Clima caluroso.";
 }
 else if(temp < 5){
  t="Hace mucho frío, abrígate.";
 }
 else if(temp < 15){
  t="Clima fresco.";
 }
 else{
  t="Clima agradable.";
 }

 if(hum > 80) t += " Alta humedad.";
 if(viento > 30) t += " Viento fuerte.";
 if(uv > 7) t += " Protección solar recomendada.";

 document.getElementById("explicacion").innerText = t;

 hablar(t);
}

// fondo dinámico
function fondo(lluvia,temp){
 if(lluvia>60){
  document.body.style.backgroundImage="url('https://images.unsplash.com/photo-1501696461440-e6b7f5f9a8d9')";
 }else if(temp>30){
  document.body.style.backgroundImage="url('https://images.unsplash.com/photo-1501973801540-537f08ccae7b')";
 }else{
  document.body.style.backgroundImage="url('https://images.unsplash.com/photo-1506744038136-46273834b3fb')";
 }
}

// clima
async function clima(){
 try{
  let r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&hourly=relativehumidity_2m,precipitation_probability,apparent_temperature,uv_index&timezone=auto`);
  let d=await r.json();

  let temp=d.current_weather.temperature;
  let viento=d.current_weather.windspeed;
  let hum=d.hourly.relativehumidity_2m[0];
  let lluvia=d.hourly.precipitation_probability[0];
  let sensacion=d.hourly.apparent_temperature[0];
  let uv=d.hourly.uv_index[0];

  document.getElementById("temp").innerText="🌡️ "+temp+"°C";
  document.getElementById("sensacion").innerText="🥵 "+sensacion+"°C";
  document.getElementById("hum").innerText="💧 "+hum+"%";
  document.getElementById("viento").innerText="🌬️ "+viento+" km/h";
  document.getElementById("uv").innerText="☀️ UV "+uv;
  document.getElementById("lluvia").innerText="🌧️ "+lluvia+"%";

  explicar(temp,lluvia,uv,hum,viento);
  fondo(lluvia,temp);

  chart.data.labels.push(new Date().toLocaleTimeString());
  chart.data.datasets[0].data.push(temp);

  if(chart.data.labels.length>10){
   chart.data.labels.shift();
   chart.data.datasets[0].data.shift();
  }

  chart.update();

 }catch(e){
  document.getElementById("explicacion").innerText="Error al cargar clima";
  console.log(e);
 }
}

// ejecutar
clima();
setInterval(clima,30000); // cada 30 segundos

// mapa
let mapa=L.map('mapa').setView([lat,lon],10);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapa);

</script>

</body>
</html>
