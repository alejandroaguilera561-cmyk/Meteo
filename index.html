<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Meteo MAX PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;font-family:'Segoe UI';color:white;text-align:center;transition:1s;}
.frio{background:linear-gradient(#1e3a8a,#020617);}
.templado{background:linear-gradient(#0f172a,#020617);}
.calor{background:linear-gradient(#7f1d1d,#020617);}
.app{padding:15px;}
.dashboard{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.card{background:rgba(255,255,255,0.1);padding:15px;border-radius:15px;}
.big{font-size:26px;}
#alerta{background:#7f1d1d;padding:10px;border-radius:10px;margin-bottom:10px;}
#explicacion{background:#1e293b;padding:15px;border-radius:12px;margin:10px 0;}
#pronostico,#horas{display:flex;gap:10px;overflow-x:auto;}
.day{background:rgba(255,255,255,0.1);padding:10px;border-radius:10px;min-width:120px;}
</style>
</head>

<body class="templado">

<div class="app">

<h2>🌦️ Meteo MAX PRO</h2>

<div id="alerta">Cargando alertas...</div>

<div class="dashboard">
<div class="card">Temperatura<div class="big" id="temp">--</div></div>
<div class="card">Sensación 🥶🥵<div class="big" id="sensacion">--</div></div>
<div class="card">💧 Humedad<br><span id="hum"></span></div>
<div class="card">🌬️ Viento<br><span id="viento"></span></div>
<div class="card">☀️ UV<br><span id="uv"></span></div>
<div class="card">🌧️ Lluvia<br><span id="lluvia"></span></div>
</div>

<div id="explicacion">Cargando...</div>

<h3>📅 Pronóstico</h3>
<div id="pronostico"></div>

<h3>⏰ Hoy</h3>
<div id="horas"></div>

<canvas id="grafico"></canvas>

<div id="mapa" style="height:200px;margin-top:10px;border-radius:10px;"></div>

</div>

<script>
let lat=-25.3, lon=-57.6;

// emoji
function emojiTemp(t){
 if(t>=30) return "🥵";
 if(t>=20) return "🙂";
 if(t>=12) return "🧥";
 if(t>=6) return "🥶";
 return "❄️";
}

// alerta
function alerta(temp,lluvia){
 let a="✅ Sin alertas";
 if(temp<8) a="⚠️ Mucho frío";
 if(temp>35) a="🔥 Calor extremo";
 if(lluvia>60) a+=" 🌧️ Lluvia fuerte";
 document.getElementById("alerta").innerText=a;
}

// explicación
function explicar(temp,lluvia){
 let t="",c="";
 if(temp>=30){t="Mucho calor.";c="Usá ropa liviana.";}
 else if(temp>=20){t="Cálido.";c="Salí cómodo.";}
 else if(temp>=15){t="Templado.";c="Llevá abrigo.";}
 else if(temp>=8){t="Frío.";c="Abrigate.";}
 else{t="Mucho frío.";c="Abrigo fuerte.";}
 if(lluvia>60) c+=" Paraguas.";
 document.getElementById("explicacion").innerText=t+" "+c;
}

// clima
async function clima(){
 try{
 let r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&hourly=temperature_2m,relativehumidity_2m,precipitation_probability,apparent_temperature,uv_index,time&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=auto`);
 let d=await r.json();

 // índice real de hora
 let ahora = new Date().toISOString().slice(0,13);
 let i = d.hourly.time.findIndex(t=>t.includes(ahora));
 if(i<0) i=0;

 // PROMEDIO para más precisión
 let temp = d.current_weather.temperature;
 let sens = (d.hourly.apparent_temperature[i] + d.hourly.apparent_temperature[i+1]) / 2;
 let hum = (d.hourly.relativehumidity_2m[i] + d.hourly.relativehumidity_2m[i+1]) / 2;
 let lluvia = (d.hourly.precipitation_probability[i] + d.hourly.precipitation_probability[i+1]) / 2;
 let uv = d.hourly.uv_index[i];
 let viento = d.current_weather.windspeed;

 // mostrar
 document.getElementById("temp").innerText = temp+"°C "+emojiTemp(temp);
 document.getElementById("sensacion").innerText = sens.toFixed(1)+"°C "+emojiTemp(sens);
 document.getElementById("hum").innerText = hum.toFixed(0)+"%";
 document.getElementById("viento").innerText = viento+" km/h";

 let uvTexto = uv<3?"Bajo":uv<6?"Medio":"Alto";
 document.getElementById("uv").innerText = uv+" ("+uvTexto+")";

 document.getElementById("lluvia").innerText = lluvia.toFixed(0)+"%";

 alerta(temp,lluvia);
 explicar(temp,lluvia);

 // horas
 let horasDiv=document.getElementById("horas");
 horasDiv.innerHTML="";
 [["🌅 Mañana",8],["🌇 Tarde",14],["🌙 Noche",20]].forEach(b=>{
  let t=d.hourly.temperature_2m[b[1]];
  let l=d.hourly.precipitation_probability[b[1]];
  horasDiv.innerHTML+=`<div class="day">${b[0]}<br>${emojiTemp(t)} ${t}°<br>🌧️ ${l}%</div>`;
 });

 // días
 let proDiv=document.getElementById("pronostico");
 proDiv.innerHTML="";
 d.daily.time.forEach((dia,i)=>{
  let max=d.daily.temperature_2m_max[i];
  let min=d.daily.temperature_2m_min[i];
  let lluvia=d.daily.precipitation_probability_max[i];
  proDiv.innerHTML+=`<div class="day">${dia.slice(5)}<br>🌡️${max}°<br>❄️${min}°<br>🌧️${lluvia}%</div>`;
 });

 }catch(e){
  document.getElementById("alerta").innerText="⚠️ Error al cargar datos";
 }
}

clima();
setInterval(clima,60000);

// mapa
let mapa=L.map('mapa').setView([lat,lon],10);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapa);

</script>

</body>
</html>
