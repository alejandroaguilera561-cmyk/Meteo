<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;font-family:'Segoe UI';color:white;text-align:center;transition:1s;}
.frio{background:linear-gradient(#1e3a8a,#020617);}
.templado{background:linear-gradient(#0f172a,#020617);}
.calor{background:linear-gradient(#7f1d1d,#020617);}

.dashboard{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.card{background:rgba(255,255,255,0.1);padding:10px;border-radius:10px;}

#pronostico,#horas{display:flex;overflow-x:auto;gap:10px;}
.day{background:rgba(255,255,255,0.1);padding:10px;border-radius:10px;min-width:100px;}
</style>
</head>

<body class="templado">

<h2>🌦️ Meteo MAX PRO</h2>

<button onclick="activarPushReal()">📡 Activar Push</button>

<div id="temp"></div>
<div id="sensacion"></div>

<div id="explicacion"></div>

<h3>⏰ Hoy</h3>
<div id="horas"></div>

<h3>📅 Pronóstico</h3>
<div id="pronostico"></div>

<script>
let lat=-25.3, lon=-57.6;

// 🔔 PUSH REAL
async function activarPushReal(){
 const permiso = await Notification.requestPermission();
 if(permiso!=="granted") return alert("Permiso denegado");

 const token = await messaging.getToken({
  vapidKey: "ACA_TU_VAPID_KEY"
 });

 console.log("TOKEN:",token);
 alert("Push activado");
}

// EMOJI
function emojiTemp(t){
 if(t>=30) return "🥵";
 if(t>=20) return "🙂";
 if(t>=12) return "🧥";
 if(t>=6) return "🥶";
 return "❄️";
}

// MENSAJE
function explicar(temp,lluvia){
 let txt=temp<10?"Hace frío":"Clima normal";
 if(lluvia>60) txt+=" y puede llover";
 document.getElementById("explicacion").innerText=txt;
}

// CLIMA
async function clima(){
 let r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max&hourly=temperature_2m,precipitation_probability&timezone=auto`);
 let d=await r.json();

 let temp=d.current_weather.temperature;
 let sens=d.hourly.temperature_2m[0];

 document.getElementById("temp").innerText=temp+"°C "+emojiTemp(temp);
 document.getElementById("sensacion").innerText=sens+"°C "+emojiTemp(sens);

 explicar(temp,d.hourly.precipitation_probability[0]);

 // HORAS
 let horasDiv=document.getElementById("horas");
 horasDiv.innerHTML="";
 [["Mañana",8],["Tarde",14],["Noche",20]].forEach(b=>{
  let t=d.hourly.temperature_2m[b[1]];
  horasDiv.innerHTML+=`<div class="day">${b[0]}<br>${emojiTemp(t)} ${t}°</div>`;
 });

 // PRONÓSTICO
 let cont=document.getElementById("pronostico");
 cont.innerHTML="";
 d.daily.time.forEach((dia,i)=>{
  cont.innerHTML+=`<div class="day">${dia.slice(5)}<br>🌡️${d.daily.temperature_2m_max[i]}°<br>❄️${d.daily.temperature_2m_min[i]}°</div>`;
 });
}

clima();
setInterval(clima,30000);
</script>

</body>
</html>
