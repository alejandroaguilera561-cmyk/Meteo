<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Meteo MAX</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
 margin:0;
 font-family:'Segoe UI';
 background:#0f172a;
 color:white;
 text-align:center;
}
button{
 padding:10px;
 margin:10px;
 border:none;
 border-radius:10px;
}
.day{
 background:rgba(255,255,255,0.1);
 padding:10px;
 margin:5px;
 border-radius:10px;
 display:inline-block;
}
</style>
</head>

<body>

<h2>🌦️ Meteo MAX</h2>

<button onclick="activarAlertas()">🔔 Activar Alertas</button>

<h3 id="temp">--</h3>
<div id="explicacion"></div>

<h3>⏰ Hoy</h3>
<div id="horas"></div>

<script>

let lat=-25.3, lon=-57.6;
let permiso=false;

// 🔔 ACTIVAR ALERTAS
async function activarAlertas(){
 const p = await Notification.requestPermission();
 if(p==="granted"){
  permiso=true;
  alert("Alertas activadas");
 }
}

// 🔔 ALERTA AUTOMÁTICA
function alertaClima(temp,lluvia){

 if(!permiso) return;

 let mensaje="";

 if(temp<=8) mensaje="🥶 Hace frío, abrígate";
 else if(temp>=35) mensaje="🥵 Mucho calor";
 else if(lluvia>=70) mensaje="🌧️ Puede llover";

 if(mensaje){
  new Notification("🌦️ Meteo", { body: mensaje });
 }
}

// EMOJI
function emojiTemp(t){
 if(t>=30) return "🥵";
 if(t>=20) return "🙂";
 if(t>=12) return "🧥";
 if(t>=6) return "🥶";
 return "❄️";
}

// CLIMA
async function clima(){

 let r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&hourly=temperature_2m,precipitation_probability&timezone=auto`);
 let d=await r.json();

 let temp=d.current_weather.temperature;
 let lluvia=d.hourly.precipitation_probability[0];

 document.getElementById("temp").innerText=temp+"°C "+emojiTemp(temp);
 document.getElementById("explicacion").innerText="Clima actual";

 alertaClima(temp,lluvia);

 // HORAS
 let horas=document.getElementById("horas");
 horas.innerHTML="";
 [["🌅 Mañana",8],["🌇 Tarde",14],["🌙 Noche",20]].forEach(b=>{
  let t=d.hourly.temperature_2m[b[1]];
  horas.innerHTML+=`<div class="day">${b[0]}<br>${emojiTemp(t)} ${t}°</div>`;
 });
}

clima();

// ⏱️ cada 5 minutos
setInterval(clima,300000);

</script>

</body>
</html>
