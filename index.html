<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Meteo MAX PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;font-family:'Segoe UI';color:white;text-align:center;transition:1s;}
.frio{background:linear-gradient(#1e3a8a,#020617);}
.templado{background:linear-gradient(#0f172a,#020617);}
.calor{background:linear-gradient(#7f1d1d,#020617);}

.app{padding:15px;}

.dashboard{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.card{background:rgba(255,255,255,0.1);padding:15px;border-radius:15px;}
.big{font-size:26px;}

#alerta{background:#7f1d1d;padding:10px;border-radius:10px;margin-bottom:10px;}
#explicacion{background:#1e293b;padding:15px;border-radius:12px;margin:10px 0;}

#pronostico,#horas{display:flex;gap:10px;overflow-x:auto;}
.day{background:rgba(255,255,255,0.1);padding:10px;border-radius:10px;min-width:120px;}
</style>
</head>

<body class="templado">

<div class="app">

<h2>🌦️ Meteo MAX PRO</h2>

<button onclick="activarVoz()">🔊 Voz</button>
<button onclick="toggleUbicacion()">📍 Ubicación</button>

<div id="alerta">Cargando...</div>

<div class="dashboard">
<div class="card">Temperatura<div class="big" id="temp">--</div></div>
<div class="card">Sensación<div class="big" id="sensacion">--</div></div>
<div class="card">💧 Humedad<div class="big" id="hum">--</div></div>
<div class="card">🌬️ Viento<div class="big" id="viento">--</div></div>
<div class="card">☀️ UV<div class="big" id="uv">--</div></div>
<div class="card">🌧️ Lluvia<div class="big" id="lluvia">--</div></div>
</div>

<div id="explicacion">Cargando...</div>

<h3>📅 Pronóstico</h3>
<div id="pronostico"></div>

<h3>⏰ Hoy</h3>
<div id="horas"></div>

<canvas id="grafico"></canvas>
<div id="mapa" style="height:200px;margin-top:10px;"></div>

</div>

<script>
let lat=-25.3, lon=-57.6;

// PROMEDIO
function promedio(arr,n=6){
 let suma=0;
 for(let i=0;i<n;i++) suma+=arr[i] || 0;
 return Math.round(suma/n);
}

// VOZ
function activarVoz(){
 let texto=document.getElementById("explicacion").innerText;
 speechSynthesis.speak(new SpeechSynthesisUtterance(texto));
}

// UBICACIÓN
function toggleUbicacion(){
 navigator.geolocation.getCurrentPosition(p=>{
  lat=p.coords.latitude;
  lon=p.coords.longitude;
  mapa.setView([lat,lon],10);
  clima();
 });
}

// ALERTA
function alerta(temp,lluvia){
 let a="Sin alertas";
 if(temp<5) a="Mucho frío";
 if(temp>35) a="Calor extremo";
 if(lluvia>70) a+=" + lluvia fuerte";
 document.getElementById("alerta").innerText=a;
}

// MENSAJE
function explicar(temp,lluvia){
 let t="Clima estable";
 if(temp>30) t="Mucho calor";
 else if(temp<10) t="Frío";
 if(lluvia>60) t+=" con lluvia";
 document.getElementById("explicacion").innerText=t;
}

// GRÁFICO MEJORADO
let chart=new Chart(document.getElementById("grafico"),{
 type:'line',
 data:{
  labels:[],
  datasets:[{
    label:"Temp °C",
    data:[],
    tension:0.4
  }]
 },
 options:{
  responsive:true,
  plugins:{legend:{display:true}},
  scales:{y:{beginAtZero:false}}
 }
});

// CLIMA (ARREGLADO)
async function clima(){
 try{
  let url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,precipitation_sum&hourly=temperature_2m,relativehumidity_2m,precipitation_probability,apparent_temperature,uv_index,windspeed_10m,windgusts_10m&timezone=auto`;

  let r=await fetch(url);
  let d=await r.json();

  if(!d.current_weather) throw "Error";

  let temp=d.current_weather.temperature;
  let sens=promedio(d.hourly.apparent_temperature);
  let lluvia=promedio(d.hourly.precipitation_probability);
  let humedad=promedio(d.hourly.relativehumidity_2m);
  let uv=Math.max(...d.hourly.uv_index.slice(0,6));
  let viento=promedio(d.hourly.windspeed_10m);

  document.getElementById("temp").innerText=temp+"°C";
  document.getElementById("sensacion").innerText=sens+"°C";
  document.getElementById("hum").innerText=humedad+"%";
  document.getElementById("viento").innerText=viento+" km/h";
  document.getElementById("uv").innerText=uv;
  document.getElementById("lluvia").innerText=lluvia+"%";

  alerta(temp,lluvia);
  explicar(temp,lluvia);

  // HORAS
  let horasEl=document.getElementById("horas");
  horasEl.innerHTML="";
  [["Mañana",8],["Tarde",14],["Noche",20]].forEach(b=>{
   let t=d.hourly.temperature_2m[b[1]];
   let l=d.hourly.precipitation_probability[b[1]];
   horasEl.innerHTML+=`<div class="day">${b[0]}<br>${t}°<br>🌧️${l}%</div>`;
  });

  // PRONÓSTICO
  let pronosticoEl=document.getElementById("pronostico");
  pronosticoEl.innerHTML="";
  d.daily.time.forEach((dia,i)=>{
   pronosticoEl.innerHTML+=`<div class="day">
    ${dia.slice(5)}<br>
    🌡️${d.daily.temperature_2m_max[i]}°<br>
    ❄️${d.daily.temperature_2m_min[i]}°<br>
    🌧️${d.daily.precipitation_probability_max[i]}%
   </div>`;
  });

  // GRÁFICO
  chart.data.labels.push(new Date().toLocaleTimeString());
  chart.data.datasets[0].data.push(temp);

  if(chart.data.labels.length>10){
   chart.data.labels.shift();
   chart.data.datasets[0].data.shift();
  }

  chart.update();

 }catch(e){
  document.getElementById("alerta").innerText="Error al cargar clima";
  console.error(e);
 }
}

// MAPA
let mapa=L.map('mapa').setView([lat,lon],10);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapa);

// INICIO
clima();
setInterval(clima,600000);
</script>

</body>
</html>
