<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Meteo MAX PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;font-family:'Segoe UI';background:#020617;color:white;text-align:center;}
.app{padding:15px;}
.card{background:rgba(255,255,255,0.1);padding:15px;border-radius:15px;margin:8px;}
.dashboard{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
#mapa{height:220px;border-radius:10px;margin-top:10px;}
.day{background:rgba(255,255,255,0.1);padding:10px;border-radius:10px;min-width:100px;}
#horas,#pronostico{display:flex;overflow-x:auto;gap:10px;}
#alerta{background:#7f1d1d;padding:10px;border-radius:10px;margin:10px 0;}
</style>
</head>

<body>

<div class="app">

<h2>🌦️ Meteo MAX PRO</h2>

<div id="alerta">Cargando...</div>

<div class="dashboard">
<div class="card">🌡️ <span id="temp">--</span></div>
<div class="card">🥶🥵 <span id="sens">--</span></div>
<div class="card">💧 <span id="hum">--</span></div>
<div class="card">🌬️ <span id="viento">--</span></div>
<div class="card">☀️ <span id="uv">--</span></div>
<div class="card">🌧️ <span id="lluvia">--</span></div>
</div>

<div id="explicacion">Cargando clima...</div>

<h3>⏰ Próximas horas</h3>
<div id="horas"></div>

<h3>📅 Pronóstico</h3>
<div id="pronostico"></div>

<div id="mapa"></div>

</div>

<script>
let lat=-25.3, lon=-57.6;

// emoji
function emoji(t,l){
 if(l>70) return "🌧️";
 if(t>30) return "🥵";
 if(t>20) return "🙂";
 if(t>10) return "🧥";
 return "🥶";
}

// alerta
function alerta(t,l){
 let msg="✅ Sin alertas";
 if(l>80) msg="⛈️ Tormenta fuerte";
 else if(l>60) msg="🌧️ Lluvia probable";
 else if(t>35) msg="🔥 Calor extremo";
 else if(t<5) msg="❄️ Frío extremo";

 document.getElementById("alerta").innerText=msg;
}

// clima
async function clima(){
 try{

 let r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&hourly=temperature_2m,precipitation_probability,apparent_temperature,relativehumidity_2m,uv_index,time&daily=temperature_2m_max,temperature_2m_min&timezone=auto`);
 let d=await r.json();

 let ahora = new Date().toISOString().slice(0,13);
 let i = d.hourly.time.findIndex(t=>t.includes(ahora));
 if(i<0) i=0;

 let temp=d.current_weather.temperature || 0;
 let sens=d.hourly.apparent_temperature[i] || temp;
 let hum=d.hourly.relativehumidity_2m[i] || 0;
 let lluvia=d.hourly.precipitation_probability[i] || 0;
 let uv=d.hourly.uv_index[i] || 0;
 let viento=d.current_weather.windspeed || 0;

 document.getElementById("temp").innerText=temp+"°C "+emoji(temp,lluvia);
 document.getElementById("sens").innerText=sens+"°C";
 document.getElementById("hum").innerText=hum+"%";
 document.getElementById("viento").innerText=viento+" km/h";
 document.getElementById("uv").innerText=uv;
 document.getElementById("lluvia").innerText=lluvia+"%";

 document.getElementById("explicacion").innerText =
  lluvia>70 ? "Se esperan lluvias." :
  temp>30 ? "Mucho calor." :
  temp<8 ? "Hace frío." :
  "Clima normal.";

 alerta(temp,lluvia);

 // HORAS
 let horasDiv=document.getElementById("horas");
 horasDiv.innerHTML="";
 for(let x=i;x<i+12;x+=3){
  if(!d.hourly.temperature_2m[x]) continue;
  let t=d.hourly.temperature_2m[x];
  let l=d.hourly.precipitation_probability[x];
  horasDiv.innerHTML+=`<div class="day">${emoji(t,l)}<br>${t}°<br>${l}%</div>`;
 }

 // DIAS
 let proDiv=document.getElementById("pronostico");
 proDiv.innerHTML="";
 d.daily.time.forEach((dia,x)=>{
  let max=d.daily.temperature_2m_max[x];
  let min=d.daily.temperature_2m_min[x];
  proDiv.innerHTML+=`<div class="day">${dia.slice(5)}<br>${max}°<br>${min}°</div>`;
 });

 }catch(e){
  document.getElementById("explicacion").innerText="Error cargando datos";
  console.log(e);
 }
}

// mapa
let mapa=L.map('mapa').setView([lat,lon],10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapa);

// radar
L.tileLayer('https://tilecache.rainviewer.com/v2/radar/latest/256/{z}/{x}/{y}/2/1_1.png',{opacity:0.6}).addTo(mapa);

// ejecutar
clima();
setInterval(clima,300000);

</script>

</body>
</html>
