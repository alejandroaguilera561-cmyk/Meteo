<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Meteo MAX PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyABeW98pAbkM5aFS0eu1VcFUm7wmhXjxK8",
  authDomain: "meteor-16897.firebaseapp.com",
  projectId: "meteor-16897",
  storageBucket: "meteor-16897.firebasestorage.app",
  messagingSenderId: "988871805616",
  appId: "1:988871805616:web:b25d35bfcc1f81c1220975"
};

firebase.initializeApp(firebaseConfig);
const messaging = firebase.messaging();
</script>

<style>
body{
 margin:0;
 font-family:'Segoe UI';
 background:#0f172a;
 color:white;
 text-align:center;
}

button{
 padding:10px;
 margin:10px;
 border:none;
 border-radius:10px;
}

.day{
 background:rgba(255,255,255,0.1);
 padding:10px;
 margin:5px;
 border-radius:10px;
 display:inline-block;
}

#tokenBox{
 background:#000;
 color:#0f0;
 padding:10px;
 margin:10px;
 font-size:12px;
 word-break:break-all;
 border-radius:10px;
}
</style>
</head>

<body>

<h2>🌦️ Meteo MAX PRO</h2>

<button onclick="activarPushReal()">📡 Activar Push REAL</button>

<div id="tokenBox">Token aparecerá aquí...</div>

<h3 id="temp">--</h3>
<h3 id="sensacion">--</h3>

<div id="explicacion"></div>

<h3>⏰ Hoy</h3>
<div id="horas"></div>

<h3>📅 Pronóstico</h3>
<div id="pronostico"></div>

<script>

let lat=-25.3, lon=-57.6;

// 🔔 PUSH REAL (VISIBLE EN CELULAR)
async function activarPushReal(){

 const permiso = await Notification.requestPermission();

 if(permiso !== "granted"){
  alert("Permiso denegado");
  return;
 }

 try{

  const token = await messaging.getToken({
   vapidKey: "BIsNs4Q0gW28FvBFl_79u9s2mBDemIIyhQPY83n2IsRyrMkpl0_uf61OCHSyVXovxv4clhJ9jZSlBu1hIsDmhmw"
  });

  document.getElementById("tokenBox").innerText = token;

 }catch(e){
  document.getElementById("tokenBox").innerText = "Error: " + e;
 }

}

// EMOJIS
function emojiTemp(t){
 if(t>=30) return "🥵";
 if(t>=20) return "🙂";
 if(t>=12) return "🧥";
 if(t>=6) return "🥶";
 return "❄️";
}

// MENSAJE
function explicar(temp,lluvia){
 let txt="";

 if(temp<10) txt="Hace frío, abrígate.";
 else if(temp>30) txt="Hace mucho calor.";
 else txt="Clima normal.";

 if(lluvia>60) txt+=" Llevá paraguas.";

 document.getElementById("explicacion").innerText=txt;
}

// CLIMA
async function clima(){

 let r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&daily=temperature_2m_max,temperature_2m_min&hourly=temperature_2m,precipitation_probability&timezone=auto`);
 let d=await r.json();

 let temp=d.current_weather.temperature;
 let sens=d.hourly.temperature_2m[0];

 document.getElementById("temp").innerText=temp+"°C "+emojiTemp(temp);
 document.getElementById("sensacion").innerText=sens+"°C "+emojiTemp(sens);

 explicar(temp,d.hourly.precipitation_probability[0]);

 // HORAS
 let horasDiv=document.getElementById("horas");
 horasDiv.innerHTML="";
 [["🌅 Mañana",8],["🌇 Tarde",14],["🌙 Noche",20]].forEach(b=>{
  let t=d.hourly.temperature_2m[b[1]];
  horasDiv.innerHTML+=`<div class="day">${b[0]}<br>${emojiTemp(t)} ${t}°</div>`;
 });

 // PRONÓSTICO
 let cont=document.getElementById("pronostico");
 cont.innerHTML="";
 d.daily.time.forEach((dia,i)=>{
  cont.innerHTML+=`<div class="day">${dia.slice(5)}<br>🌡️${d.daily.temperature_2m_max[i]}°<br>❄️${d.daily.temperature_2m_min[i]}°</div>`;
 });

}

clima();
setInterval(clima,30000);

</script>

</body>
</html>
